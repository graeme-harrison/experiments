openapi: 3.0.1
info:
  title: Operating Reserve Offer Control Report
  description: Fetch Operating Reserve Offer Control data
  version: v1
servers:
  - url: https://apimgw.aeso.ca/public/operatingreserveoffercontrol-api/v1
  - url: https://gateway-apim.aeso.ca/public/operatingreserveoffercontrol-api/v1
paths:
  /operatingReserveOfferControl:
    get:
      tags:
        - Operating Reserve Offer Control Report
      summary: Fetch Operating Reserve Offer Control data for a given date that is 60 days prior to current date.
      description: "Fetch Operating Reserve Offer Control data for Date(startDate (yyyy-MM-dd))\n\nThe Operating Reserve Offer Control data is available 60 days after the date of the report, first available from October 4, 2012.\n\n"
      operationId: getOperatingReserveOfferControlReport
      parameters:
        - name: startDate
          in: query
          description: 'Any date between 2012-10-04 and current date (format: yyyy-MM-dd).'
          required: true
          schema:
            pattern: '^\d{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$'
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingReserveOfferControlReport'
              example:
                Operating Reserve Trade Merit Order:
                  - begin_datetime_utc: string
                    begin_datetime_mpt: string
                    operating_reserve_blocks:
                      - commodity: string
                        product: string
                        asset_ID: string
                        volume: string
                        active_price: 0
                        premium_price: 0
                        activation_price: 0
                        offer_control: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '405':
          description: Invalid method
        '500':
          description: Internal server error
        '503':
          description: Service unavailable
components:
  schemas:
    OperatingReserveOfferControlReport:
      type: object
      properties:
        Operating Reserve Trade Merit Order:
          type: array
          items:
            $ref: '#/components/schemas/OperatingReserveOfferControlVO'
    OperatingReserveOfferControlVO:
      type: object
      properties:
        begin_datetime_utc:
          type: string
        begin_datetime_mpt:
          type: string
        operating_reserve_blocks:
          type: array
          items:
            $ref: '#/components/schemas/OperatingReserverOfferControlCoreDataVO'
    OperatingReserverOfferControlCoreDataVO:
      type: object
      properties:
        commodity:
          type: string
        product:
          type: string
        asset_ID:
          type: string
        volume:
          type: string
        active_price:
          type: number
          format: double
        premium_price:
          type: number
          format: double
        activation_price:
          type: number
          format: double
        offer_control:
          type: string
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      name: API-KEY
      in: header
    apiKeyQuery:
      type: apiKey
      name: subscription-key
      in: query
security:
  - apiKeyHeader: [ ]
  - apiKeyQuery: [ ]